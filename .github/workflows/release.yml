name: Release Build

on:
  push:
    tags:
      - 'v*.*.*'  # 推送版本标签时触发，例如 v1.0.0
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    env:
      # secrets 不能写在 if: 里，否则 workflow 校验失败 → No jobs were run
      KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
      KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
      KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
      KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      KEYSTORE_FILE: release.jks

    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4

    - name: ☕ Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        # 不缓存 Gradle 构建产物，避免复用历史 unsigned APK
        cache: gradle

    - name: 🐘 Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: 🔐 Configure release signing
      if: env.KEYSTORE_BASE64 != ''
      run: |
        printf '%s' "$KEYSTORE_BASE64" | base64 -d > release.jks
        KS_SIZE=$(wc -c < release.jks)
        echo "Decoded keystore size: $KS_SIZE bytes"
        if [ "$KS_SIZE" -lt 500 ]; then
          echo "::error::KEYSTORE_BASE64 decode failed (size=$KS_SIZE). Re-run scripts/setup-github-secrets.ps1"
          exit 1
        fi
        printf '%s\n' \
          "storeFile=release.jks" \
          "storePassword=$KEYSTORE_PASSWORD" \
          "keyAlias=$KEY_ALIAS" \
          "keyPassword=$KEY_PASSWORD" \
          > keystore.properties
        if ! keytool -list -keystore release.jks -storepass "$KEYSTORE_PASSWORD" -alias "$KEY_ALIAS" >/dev/null 2>keytool.err; then
          echo "::error::Keystore validation failed. Check KEYSTORE_* secrets."
          head -n 3 keytool.err
          exit 1
        fi
        echo "Keystore OK: alias=$KEY_ALIAS"

    - name: ⚠️ Require signing secrets
      if: env.KEYSTORE_BASE64 == ''
      run: |
        echo "::error::GitHub Secrets 未配置。请在仓库 Settings → Secrets and variables → Actions 添加 KEYSTORE_BASE64、KEYSTORE_PASSWORD、KEY_ALIAS、KEY_PASSWORD；或本地运行 scripts/setup-github-secrets.ps1（需先 gh auth login）。"
        exit 1

    - name: 🧪 Run unit tests
      run: ./gradlew testReleaseUnitTest

    - name: 🔨 Build Release APK
      run: ./gradlew clean assembleRelease --no-build-cache

    - name: ✅ Verify signed APK
      run: |
        ls -la .out/app/outputs/apk/release/
        APK=$(ls .out/app/outputs/apk/release/app-release.apk 2>/dev/null || true)
        if [ -z "$APK" ]; then
          APK=$(ls .out/app/outputs/apk/release/*.apk 2>/dev/null | grep -v unsigned | head -n 1)
        fi
        if [ -z "$APK" ] || echo "$APK" | grep -q unsigned; then
          echo "::error::Release APK is unsigned. Check KEYSTORE_* secrets and keystore.properties."
          exit 1
        fi
        jarsigner -verify -verbose "$APK" | head -n 5
        echo "Built: $APK"
        cp "$APK" .out/app/outputs/apk/release/app-release.apk

    - name: 📝 Extract Release Notes
      id: release_notes
      run: |
        VERSION=${GITHUB_REF#refs/tags/v}
        awk "/^## \\[$VERSION\\]/,/^## \\[[0-9]/" CHANGELOG.md | sed '1d;$d' > release_notes.txt
        if [ ! -s release_notes.txt ]; then
          echo "::error::No CHANGELOG section for version $VERSION"
          exit 1
        fi

    - name: 🚀 Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        body_path: release_notes.txt
        files: .out/app/outputs/apk/release/app-release.apk
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
