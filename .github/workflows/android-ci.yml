name: Android CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      
    - name: ☕ Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle
        
    - name: 🐘 Grant execute permission for gradlew
      run: chmod +x gradlew
      
    - name: 🔍 Run Linter (Lint Check)
      run: ./gradlew lintDebug
      
    - name: 🧪 Run Unit Tests
      run: ./gradlew testDebugUnitTest
      
    - name: 🔨 Build Debug APK
      run: ./gradlew assembleDebug
      
    - name: 📤 Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: nyanpasu-debug-apk
        path: .out/app/outputs/apk/debug/*.apk
        retention-days: 7
        
    - name: 📊 Upload Lint Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: lint-report
        path: .out/app/reports/lint-results-debug.html
        retention-days: 7
